<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="900" height="600" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="450" y="40" font-family="Inter, sans-serif" font-size="24" font-weight="600" text-anchor="middle" fill="#2d3748">
    Comparison Chart
  </text>
  
  <!-- 左侧选项 -->
  <g id="option1">
    <rect x="50" y="100" width="350" height="400" rx="15" fill="white" stroke="#667eea" stroke-width="3"/>
    <text x="225" y="140" font-family="Inter, sans-serif" font-size="20" text-anchor="middle" fill="#667eea" font-weight="700">
      Option 1
    </text>
    
    <!-- 特性列表 -->
    <g id="features1">
      <circle cx="80" cy="180" r="5" fill="#667eea"/>
      <text x="100" y="185" font-family="Inter, sans-serif" font-size="14" fill="#2d3748">Feature 1</text>
      
      <circle cx="80" cy="220" r="5" fill="#667eea"/>
      <text x="100" y="225" font-family="Inter, sans-serif" font-size="14" fill="#2d3748">Feature 2</text>
      
      <circle cx="80" cy="260" r="5" fill="#667eea"/>
      <text x="100" y="265" font-family="Inter, sans-serif" font-size="14" fill="#2d3748">Feature 3</text>
    </g>
  </g>
  
  <!-- VS 分隔符 -->
  <text x="450" y="300" font-family="Inter, sans-serif" font-size="32" font-weight="700" text-anchor="middle" fill="#764ba2">
    VS
  </text>
  
  <!-- 右侧选项 -->
  <g id="option2">
    <rect x="500" y="100" width="350" height="400" rx="15" fill="white" stroke="#f5576c" stroke-width="3"/>
    <text x="675" y="140" font-family="Inter, sans-serif" font-size="20" text-anchor="middle" fill="#f5576c" font-weight="700">
      Option 2
    </text>
    
    <!-- 特性列表 -->
    <g id="features2">
      <circle cx="530" cy="180" r="5" fill="#f5576c"/>
      <text x="550" y="185" font-family="Inter, sans-serif" font-size="14" fill="#2d3748">Feature 1</text>
      
      <circle cx="530" cy="220" r="5" fill="#f5576c"/>
      <text x="550" y="225" font-family="Inter, sans-serif" font-size="14" fill="#2d3748">Feature 2</text>
      
      <circle cx="530" cy="260" r="5" fill="#f5576c"/>
      <text x="550" y="265" font-family="Inter, sans-serif" font-size="14" fill="#2d3748">Feature 3</text>
    </g>
  </g>
</svg>
