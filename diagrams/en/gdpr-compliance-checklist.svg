<svg viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="700" fill="url(#bgGrad)"/>
  <text x="400" y="40" font-family="Inter, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#2d3748">GDPR Compliance Checklist for IP Tracking</text>
  
  <rect x="50" y="80" width="700" height="580" rx="20" fill="white" stroke="#4A90E2" stroke-width="3" filter="url(#shadow)"/>
  
  <g>
    <rect x="80" y="110" width="640" height="60" rx="10" fill="#f8f9fa" stroke="#4A90E2" stroke-width="2"/>
    <circle cx="110" cy="140" r="12" fill="#4A90E2"/>
    <text x="110" y="145" font-family="Inter, sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="700">1</text>
    <text x="140" y="130" font-family="Inter, sans-serif" font-size="16" fill="#2d3748" font-weight="700">Legal Basis</text>
    <text x="140" y="150" font-family="Inter, sans-serif" font-size="13" fill="#4a5568">Obtain consent or legitimate interest</text>
  </g>
  
  <g>
    <rect x="80" y="185" width="640" height="60" rx="10" fill="#f8f9fa" stroke="#4A90E2" stroke-width="2"/>
    <circle cx="110" cy="215" r="12" fill="#4A90E2"/>
    <text x="110" y="220" font-family="Inter, sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="700">2</text>
    <text x="140" y="205" font-family="Inter, sans-serif" font-size="16" fill="#2d3748" font-weight="700">Privacy Policy</text>
    <text x="140" y="225" font-family="Inter, sans-serif" font-size="13" fill="#4a5568">Clear disclosure of data collection</text>
  </g>
  
  <g>
    <rect x="80" y="260" width="640" height="60" rx="10" fill="#f8f9fa" stroke="#4A90E2" stroke-width="2"/>
    <circle cx="110" cy="290" r="12" fill="#4A90E2"/>
    <text x="110" y="295" font-family="Inter, sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="700">3</text>
    <text x="140" y="280" font-family="Inter, sans-serif" font-size="16" fill="#2d3748" font-weight="700">Data Minimization</text>
    <text x="140" y="300" font-family="Inter, sans-serif" font-size="13" fill="#4a5568">Collect only necessary data</text>
  </g>
  
  <g>
    <rect x="80" y="335" width="640" height="60" rx="10" fill="#f8f9fa" stroke="#4A90E2" stroke-width="2"/>
    <circle cx="110" cy="365" r="12" fill="#4A90E2"/>
    <text x="110" y="370" font-family="Inter, sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="700">4</text>
    <text x="140" y="355" font-family="Inter, sans-serif" font-size="16" fill="#2d3748" font-weight="700">User Rights</text>
    <text x="140" y="375" font-family="Inter, sans-serif" font-size="13" fill="#4a5568">Right to access, delete, port data</text>
  </g>
  
  <g>
    <rect x="80" y="410" width="640" height="60" rx="10" fill="#f8f9fa" stroke="#4A90E2" stroke-width="2"/>
    <circle cx="110" cy="440" r="12" fill="#4A90E2"/>
    <text x="110" y="445" font-family="Inter, sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="700">5</text>
    <text x="140" y="430" font-family="Inter, sans-serif" font-size="16" fill="#2d3748" font-weight="700">Security Measures</text>
    <text x="140" y="450" font-family="Inter, sans-serif" font-size="13" fill="#4a5568">Encrypt and protect data</text>
  </g>
  
  <g>
    <rect x="80" y="485" width="640" height="60" rx="10" fill="#f8f9fa" stroke="#4A90E2" stroke-width="2"/>
    <circle cx="110" cy="515" r="12" fill="#4A90E2"/>
    <text x="110" y="520" font-family="Inter, sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="700">6</text>
    <text x="140" y="505" font-family="Inter, sans-serif" font-size="16" fill="#2d3748" font-weight="700">Data Retention</text>
    <text x="140" y="525" font-family="Inter, sans-serif" font-size="13" fill="#4a5568">Define retention periods</text>
  </g>
  
  <g>
    <rect x="80" y="560" width="640" height="60" rx="10" fill="#f8f9fa" stroke="#4A90E2" stroke-width="2"/>
    <circle cx="110" cy="590" r="12" fill="#4A90E2"/>
    <text x="110" y="595" font-family="Inter, sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="700">7</text>
    <text x="140" y="580" font-family="Inter, sans-serif" font-size="16" fill="#2d3748" font-weight="700">Breach Notification</text>
    <text x="140" y="600" font-family="Inter, sans-serif" font-size="13" fill="#4a5568">Report within 72 hours</text>
  </g>
  
</svg>