<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4A90E2"/>
    </marker>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="700" fill="url(#bgGrad)"/>
  <text x="450" y="35" font-family="Inter, sans-serif" font-size="26" font-weight="700" text-anchor="middle" fill="#2d3748">Email Tracking Process Flow</text>
  
  <!-- Start -->
  <ellipse cx="450" cy="90" rx="100" ry="45" fill="#4A90E2" stroke="#357ABD" stroke-width="2" opacity="0.9"/>
  <text x="450" y="100" font-family="Inter, sans-serif" font-size="16" text-anchor="middle" fill="white" font-weight="600">Start</text>
  
  <g>
    <rect x="300" y="155" width="300" height="70" rx="12" fill="white" stroke="#4A90E2" stroke-width="3" opacity="0.95" filter="url(#shadow)"/>
    <text x="450" y="180" font-family="Inter, sans-serif" font-size="15" text-anchor="middle" fill="#2d3748" font-weight="700">Send Email</text>
    <text x="450" y="200" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568">Email with tracking pixel sent</text>
  </g>
  
  <path d="M 450 230 L 450 225" stroke="#4A90E2" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <g>
    <rect x="300" y="225" width="300" height="70" rx="12" fill="white" stroke="#357ABD" stroke-width="3" opacity="0.95" filter="url(#shadow)"/>
    <text x="450" y="250" font-family="Inter, sans-serif" font-size="15" text-anchor="middle" fill="#2d3748" font-weight="700">Email Opened</text>
    <text x="450" y="270" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568">Recipient opens email</text>
  </g>
  
  <path d="M 450 300 L 450 295" stroke="#4A90E2" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <g>
    <rect x="300" y="295" width="300" height="70" rx="12" fill="white" stroke="#2E5C8A" stroke-width="3" opacity="0.95" filter="url(#shadow)"/>
    <text x="450" y="320" font-family="Inter, sans-serif" font-size="15" text-anchor="middle" fill="#2d3748" font-weight="700">Pixel Loaded</text>
    <text x="450" y="340" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568">Tracking pixel image loads</text>
  </g>
  
  <path d="M 450 370 L 450 365" stroke="#4A90E2" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <g>
    <rect x="300" y="365" width="300" height="70" rx="12" fill="white" stroke="#1E3A5F" stroke-width="3" opacity="0.95" filter="url(#shadow)"/>
    <text x="450" y="390" font-family="Inter, sans-serif" font-size="15" text-anchor="middle" fill="#2d3748" font-weight="700">IP Captured</text>
    <text x="450" y="410" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568">Server logs IP address</text>
  </g>
  
  <path d="M 450 440 L 450 435" stroke="#4A90E2" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <g>
    <rect x="300" y="435" width="300" height="70" rx="12" fill="white" stroke="#0F1F2F" stroke-width="3" opacity="0.95" filter="url(#shadow)"/>
    <text x="450" y="460" font-family="Inter, sans-serif" font-size="15" text-anchor="middle" fill="#2d3748" font-weight="700">Data Recorded</text>
    <text x="450" y="480" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568">Store: IP, time, location</text>
  </g>
  
  <path d="M 450 510 L 450 505" stroke="#4A90E2" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <g>
    <rect x="300" y="505" width="300" height="70" rx="12" fill="white" stroke="#48bb78" stroke-width="3" opacity="0.95" filter="url(#shadow)"/>
    <text x="450" y="530" font-family="Inter, sans-serif" font-size="15" text-anchor="middle" fill="#2d3748" font-weight="700">Analytics Updated</text>
    <text x="450" y="550" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568">Dashboard shows open rate</text>
  </g>
  
  <path d="M 450 580 L 450 620" stroke="#4A90E2" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <ellipse cx="450" cy="650" rx="100" ry="45" fill="#48bb78" stroke="#38a169" stroke-width="2" opacity="0.9"/>
  <text x="450" y="660" font-family="Inter, sans-serif" font-size="16" text-anchor="middle" fill="white" font-weight="600">Complete</text>
</svg>