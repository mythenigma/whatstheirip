<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#667eea"/>
    </marker>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="700" fill="url(#bgGrad)"/>
  <text x="450" y="35" font-family="Inter, sans-serif" font-size="26" font-weight="700" text-anchor="middle" fill="#2d3748">IP追踪工作原理</text>
  
  <!-- Start -->
  <ellipse cx="450" cy="90" rx="100" ry="45" fill="#667eea" stroke="#764ba2" stroke-width="2" opacity="0.9"/>
  <text x="450" y="100" font-family="Inter, sans-serif" font-size="16" text-anchor="middle" fill="white" font-weight="600">开始</text>
  
  <g>
    <rect x="300" y="155" width="300" height="70" rx="12" fill="white" stroke="#667eea" stroke-width="3" opacity="0.95" filter="url(#shadow)"/>
    <text x="450" y="180" font-family="Inter, sans-serif" font-size="15" text-anchor="middle" fill="#2d3748" font-weight="700">用户访问网站</text>
    <text x="450" y="200" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568">浏览器发送请求</text>
  </g>
  
  <path d="M 450 230 L 450 225" stroke="#667eea" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <g>
    <rect x="300" y="225" width="300" height="70" rx="12" fill="white" stroke="#764ba2" stroke-width="3" opacity="0.95" filter="url(#shadow)"/>
    <text x="450" y="250" font-family="Inter, sans-serif" font-size="15" text-anchor="middle" fill="#2d3748" font-weight="700">服务器接收请求</text>
    <text x="450" y="270" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568">服务器记录IP地址</text>
  </g>
  
  <path d="M 450 300 L 450 295" stroke="#667eea" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <g>
    <rect x="300" y="295" width="300" height="70" rx="12" fill="white" stroke="#f093fb" stroke-width="3" opacity="0.95" filter="url(#shadow)"/>
    <text x="450" y="320" font-family="Inter, sans-serif" font-size="15" text-anchor="middle" fill="#2d3748" font-weight="700">IP地理位置查询</text>
    <text x="450" y="340" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568">数据库匹配IP到位置</text>
  </g>
  
  <path d="M 450 370 L 450 365" stroke="#667eea" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <g>
    <rect x="300" y="365" width="300" height="70" rx="12" fill="white" stroke="#f5576c" stroke-width="3" opacity="0.95" filter="url(#shadow)"/>
    <text x="450" y="390" font-family="Inter, sans-serif" font-size="15" text-anchor="middle" fill="#2d3748" font-weight="700">数据收集</text>
    <text x="450" y="410" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568">收集：IP、位置、时间、设备</text>
  </g>
  
  <path d="M 450 440 L 450 435" stroke="#667eea" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <g>
    <rect x="300" y="435" width="300" height="70" rx="12" fill="white" stroke="#4facfe" stroke-width="3" opacity="0.95" filter="url(#shadow)"/>
    <text x="450" y="460" font-family="Inter, sans-serif" font-size="15" text-anchor="middle" fill="#2d3748" font-weight="700">数据分析处理</text>
    <text x="450" y="480" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568">分析和存储数据</text>
  </g>
  
  <path d="M 450 510 L 450 505" stroke="#667eea" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <g>
    <rect x="300" y="505" width="300" height="70" rx="12" fill="white" stroke="#48bb78" stroke-width="3" opacity="0.95" filter="url(#shadow)"/>
    <text x="450" y="530" font-family="Inter, sans-serif" font-size="15" text-anchor="middle" fill="#2d3748" font-weight="700">结果显示</text>
    <text x="450" y="550" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568">显示追踪结果</text>
  </g>
  
  <path d="M 450 580 L 450 620" stroke="#667eea" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <ellipse cx="450" cy="650" rx="100" ry="45" fill="#48bb78" stroke="#38a169" stroke-width="2" opacity="0.9"/>
  <text x="450" y="660" font-family="Inter, sans-serif" font-size="16" text-anchor="middle" fill="white" font-weight="600">完成</text>
</svg>