<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#667eea"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- 标题 -->
  <text x="400" y="40" font-family="Inter, sans-serif" font-size="24" font-weight="600" text-anchor="middle" fill="#2d3748">
    IP追踪流程图
  </text>
  
  <!-- 开始节点 -->
  <g id="start">
    <ellipse cx="400" cy="100" rx="90" ry="45" fill="#667eea" stroke="#764ba2" stroke-width="2" opacity="0.9"/>
    <text x="400" y="110" font-family="Inter, sans-serif" font-size="16" text-anchor="middle" fill="white" font-weight="600">
      开始
    </text>
  </g>
  
  <!-- 步骤 -->
  <g id="step1">
    <rect x="250" y="160" width="300" height="80" rx="12" fill="white" stroke="#667eea" stroke-width="3" opacity="0.95" filter="url(#shadow)"/>
    <text x="400" y="185" font-family="Inter, sans-serif" font-size="16" text-anchor="middle" fill="#2d3748" font-weight="700">
      创建追踪链接
    </text>
    <text x="400" y="205" font-family="Inter, sans-serif" font-size="13" text-anchor="middle" fill="#4a5568">
      生成唯一的追踪URL
    </text>
  </g>
  
  <path d="M 400 240 L 400 240" stroke="#667eea" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <g id="step2">
    <rect x="250" y="240" width="300" height="80" rx="12" fill="white" stroke="#764ba2" stroke-width="3" opacity="0.95" filter="url(#shadow)"/>
    <text x="400" y="265" font-family="Inter, sans-serif" font-size="16" text-anchor="middle" fill="#2d3748" font-weight="700">
      分享链接
    </text>
    <text x="400" y="285" font-family="Inter, sans-serif" font-size="13" text-anchor="middle" fill="#4a5568">
      通过邮件、社交媒体或消息发送链接
    </text>
  </g>
  
  <path d="M 400 320 L 400 320" stroke="#667eea" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <g id="step3">
    <rect x="250" y="320" width="300" height="80" rx="12" fill="white" stroke="#f093fb" stroke-width="3" opacity="0.95" filter="url(#shadow)"/>
    <text x="400" y="345" font-family="Inter, sans-serif" font-size="16" text-anchor="middle" fill="#2d3748" font-weight="700">
      用户点击
    </text>
    <text x="400" y="365" font-family="Inter, sans-serif" font-size="13" text-anchor="middle" fill="#4a5568">
      目标用户点击追踪链接
    </text>
  </g>
  
  <path d="M 400 400 L 400 400" stroke="#667eea" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <g id="step4">
    <rect x="250" y="400" width="300" height="80" rx="12" fill="white" stroke="#f5576c" stroke-width="3" opacity="0.95" filter="url(#shadow)"/>
    <text x="400" y="425" font-family="Inter, sans-serif" font-size="16" text-anchor="middle" fill="#2d3748" font-weight="700">
      捕获IP
    </text>
    <text x="400" y="445" font-family="Inter, sans-serif" font-size="13" text-anchor="middle" fill="#4a5568">
      服务器记录访问者的IP地址
    </text>
  </g>
  
  <path d="M 400 480 L 400 480" stroke="#667eea" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <g id="step5">
    <rect x="250" y="480" width="300" height="80" rx="12" fill="white" stroke="#4facfe" stroke-width="3" opacity="0.95" filter="url(#shadow)"/>
    <text x="400" y="505" font-family="Inter, sans-serif" font-size="16" text-anchor="middle" fill="#2d3748" font-weight="700">
      查看结果
    </text>
    <text x="400" y="525" font-family="Inter, sans-serif" font-size="13" text-anchor="middle" fill="#4a5568">
      访问IP数据和地理位置信息
    </text>
  </g>
  
  <!-- 结束节点 -->
  <path d="M 400 540 L 400 555" stroke="#667eea" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <g id="end">
    <ellipse cx="400" cy="570" rx="90" ry="45" fill="#48bb78" stroke="#38a169" stroke-width="2" opacity="0.9"/>
    <text x="400" y="580" font-family="Inter, sans-serif" font-size="16" text-anchor="middle" fill="white" font-weight="600">
      完成
    </text>
  </g>
  
  <!-- 阴影效果 -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>