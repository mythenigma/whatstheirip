<svg viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="1000" height="650" fill="url(#bgGrad)"/>
  <text x="500" y="40" font-family="Inter, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#2d3748">IP追踪器 vs IP抓取器</text>
  
  <!-- IP Tracker -->
  <g id="tracker">
    <rect x="50" y="100" width="400" height="500" rx="20" fill="white" stroke="#667eea" stroke-width="4" opacity="0.95" filter="url(#shadow)"/>
    <text x="250" y="145" font-family="Inter, sans-serif" font-size="24" text-anchor="middle" fill="#667eea" font-weight="700">IP追踪器</text>
    
    <line x1="70" x2="430" y1="170" y2="170" stroke="#667eea" stroke-width="2"/>
    <circle cx="80" cy="210" r="6" fill="#667eea"/>
    <text x="100" y="215" font-family="Inter, sans-serif" font-size="14" fill="#2d3748">实时监控</text>
    <circle cx="80" cy="260" r="6" fill="#667eea"/>
    <text x="100" y="265" font-family="Inter, sans-serif" font-size="14" fill="#2d3748">分析仪表板</text>
    <circle cx="80" cy="310" r="6" fill="#667eea"/>
    <text x="100" y="315" font-family="Inter, sans-serif" font-size="14" fill="#2d3748">地理位置数据</text>
    <circle cx="80" cy="360" r="6" fill="#667eea"/>
    <text x="100" y="365" font-family="Inter, sans-serif" font-size="14" fill="#2d3748">多种追踪方法</text>
    <circle cx="80" cy="410" r="6" fill="#667eea"/>
    <text x="100" y="415" font-family="Inter, sans-serif" font-size="14" fill="#2d3748">法律合规</text>
  </g>
  
  <!-- VS -->
  <text x="500" y="350" font-family="Inter, sans-serif" font-size="36" font-weight="700" text-anchor="middle" fill="#764ba2">VS</text>
  
  <!-- IP Grabber -->
  <g id="grabber">
    <rect x="550" y="100" width="400" height="500" rx="20" fill="white" stroke="#f5576c" stroke-width="4" opacity="0.95" filter="url(#shadow)"/>
    <text x="750" y="145" font-family="Inter, sans-serif" font-size="24" text-anchor="middle" fill="#f5576c" font-weight="700">{grabber_title}</text>
    
    <line x1="570" x2="930" y1="170" y2="170" stroke="#f5576c" stroke-width="2"/>
    <circle cx="580" cy="210" r="6" fill="#f5576c"/>
    <text x="600" y="215" font-family="Inter, sans-serif" font-size="14" fill="#2d3748">一次性捕获</text>
    <circle cx="580" cy="260" r="6" fill="#f5576c"/>
    <text x="600" y="265" font-family="Inter, sans-serif" font-size="14" fill="#2d3748">简单链接分享</text>
    <circle cx="580" cy="310" r="6" fill="#f5576c"/>
    <text x="600" y="315" font-family="Inter, sans-serif" font-size="14" fill="#2d3748">基本IP记录</text>
    <circle cx="580" cy="360" r="6" fill="#f5576c"/>
    <text x="600" y="365" font-family="Inter, sans-serif" font-size="14" fill="#2d3748">快速设置</text>
    <circle cx="580" cy="410" r="6" fill="#f5576c"/>
    <text x="600" y="415" font-family="Inter, sans-serif" font-size="14" fill="#2d3748">轻量级工具</text>
  </g>
</svg>